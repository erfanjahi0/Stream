# ──────────────────────────────────────────────
# StreamForge — Nixpacks Configuration for Railway
# Installs ffmpeg via apt-get (reliable on Railway)
# ──────────────────────────────────────────────

[phases.setup]
aptPkgs = ["ffmpeg", "fonts-dejavu-core"]

[phases.install]
cmds = ["npm install --production"]

[phases.build]
cmds = ["echo 'Build complete'"]

[start]
cmd = "node src/server.js"
